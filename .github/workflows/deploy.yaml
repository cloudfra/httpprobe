name: CI

on:
  push:
    tags: ["v*"]
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Set the job key. The key is displayed as the job name
  # when a job name is not provided
  build-linux:
    name: "Build Linux"
    runs-on: ["self-hosted", "linux", "large"]
    permissions:
      contents: write
      packages: write
      checks: write
      # Required by actions/upload-code-coverage below.
      # https://docs.github.com/en/code-security/how-tos/maintain-quality-code/set-up-code-coverage
      code-quality: write
    timeout-minutes: 20
    steps:
      - name: Fix mod cache permissions
        run: |
          chmod -R u+w "$GITHUB_WORKSPACE/build/toolchain" 2>/dev/null || true

      - name: Checkout code
        # https://github.com/actions/checkout
        uses: actions/checkout@v7

      - name: Setup Go
        # https://github.com/actions/setup-go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: System Information
        run: make system-info

      # - name: Container Fix
      #   run: git config --system --add safe.directory /__w/

      - name: Prepare Build
        run: |
          make clean
          make deps
          make lint tools -j"$(nproc)"

      - name: Test
        run: make test

      - name: Test (Deflake)
        run: make test-deflake

      - name: Coverage
        run: make coverage.txt coverage.xml

      - name: Benchmark
        run: make benchmark.html
      
      - name: Publish Benchmark (7 Days)
        # https://github.com/actions/upload-artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-linux.html
          path: |
            benchmark.html
          retention-days: 7
          if-no-files-found: error

      - name: Push Code Coverage
        # https://github.com/codecov/codecov-action
        uses: codecov/codecov-action@v7
        with:
          name: codecov-umbrella
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.txt
          flags: unittests
          fail_ci_if_error: true
          verbose: true

      - name: Upload Coverage Report
        # https://github.com/actions/upload-code-coverage
        # https://docs.github.com/en/code-security/how-tos/maintain-quality-code/set-up-code-coverage#step-2-upload-the-coverage-report
        # This 403'd on every run ("Resource not accessible by integration")
        # until the code-quality: write permission above was added - that
        # was the actual fix. continue-on-error (rather than the action's
        # own fail-on-error: false) is kept as a belt-and-suspenders
        # safety net so a future regression here shows up as a visibly
        # failed step/annotation instead of a silently swallowed pass,
        # without blocking the rest of the job over what's a supplementary
        # reporting step.
        if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && !startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        uses: actions/upload-code-coverage@v1
        with:
          file: coverage.xml
          language: Go
          label: code-coverage/gotest

      - name: Build Binaries
        run: make all -j"$(nproc)"

      - name: Set up Docker Buildx (Scan)
        # https://github.com/docker/setup-buildx-action
        # Runs unconditionally (including on pull requests), unlike the
        # push-pipeline Buildx setup below - vulnerability scanning needs to
        # catch issues before merge, not just before a release push.
        uses: docker/setup-buildx-action@v4

      - name: Scan Container Image
        # Builds a local single-arch image with --load purely so trivy has
        # something to scan; independent of the multi-arch push pipeline
        # further down, which never loads images into the local daemon.
        run: make scan-images

      - name: Install Signing Dependencies
        run: sudo apt-get update && sudo apt-get install -y osslsigncode binutils openssl

      - name: Release Package
        if: ${{ github.event_name != 'pull_request' }}
        run: make build/packages/release.tar.gz

      - name: Create Release Binaries
        run: make release-binaries

      - name: Login to GitHub Container Registry
        # https://github.com/docker/login-action#github-packages-docker-registry
        uses: docker/login-action@v4
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        # https://github.com/docker/login-action#github-packages-docker-registry
        uses: docker/login-action@v4
        if: ${{ github.event_name != 'pull_request' }}
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up QEMU
        # https://github.com/docker/setup-qemu-action
        uses: docker/setup-qemu-action@v4
        if: ${{ github.event_name != 'pull_request' }}

      - name: Set up Docker Buildx
        # https://github.com/docker/setup-buildx-action
        uses: docker/setup-buildx-action@v4
        if: ${{ github.event_name != 'pull_request' }}

      - name: Publish Binaries (Pull Request)
        # https://github.com/actions/upload-artifact
        uses: actions/upload-artifact@v7
        if: ${{ github.event_name == 'pull_request' }}
        with:
          name: commit-binaries-${{ github.sha }}
          path: |
            build/bin/linux/amd64/httpprobe
            build/bin/windows/amd64/httpprobe.exe
          retention-days: 1
          if-no-files-found: error

      - name: Publish Binaries (7 Days)
        # https://github.com/actions/upload-artifact
        uses: actions/upload-artifact@v7
        if: ${{ !startsWith(github.ref, 'refs/tags/') && github.event_name != 'pull_request' }}
        with:
          name: commit-binaries-${{ github.sha }}
          path: |
            build/bin/linux/amd64/httpprobe
            build/bin/windows/amd64/httpprobe.exe
          retention-days: 7
          if-no-files-found: error

      - name: Create Release
        # https://github.com/softprops/action-gh-release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            LICENSE
            build/packages/release.tar.gz
            build/release/httpprobe-darwin_arm64
            build/release/httpprobe-linux_amd64
            build/release/httpprobe-linux_arm64
            build/release/httpprobe-windows_amd64.exe
            build/release/httpprobe-windows_arm64.exe

      - name: Push Images (Commit)
        if: ${{ !startsWith(github.ref, 'refs/tags/') && github.event_name != 'pull_request' }}
        run: |
          make REGISTRY=docker.io/cloudfra linux-images windows-images
          make build/packages/release.tar.gz

      - name: Push Images (Release)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          make DOCKER_PUSH=--push REGISTRY=docker.io/cloudfra images
          make DOCKER_PUSH=--push REGISTRY=ghcr.io/cloudfra images
          make build/packages/release.tar.gz

      - name: Push Images (Latest)
        if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-')
        run: |
          make DOCKER_PUSH=--push REGISTRY=docker.io/cloudfra images
          make DOCKER_PUSH=--push REGISTRY=ghcr.io/cloudfra images

  build-windows:
    name: "Build Windows"
    runs-on: ["self-hosted", "windows", "large"]
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Prepare Build
        run: |
          make clean
          make deps
          make tools -j"$(nproc)"

      - name: Build
        run: make windows-binaries -j4

      - name: Test
        run: make test

      - name: Test (Race Test)
        run: make GO_TEST_COUNT=5 test-deflake

      - name: Benchmark
        run: make benchmark.html
      
      - name: Publish Benchmark (7 Days)
        # https://github.com/actions/upload-artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-windows.html
          path: |
            benchmark.html
          retention-days: 7
          if-no-files-found: error
