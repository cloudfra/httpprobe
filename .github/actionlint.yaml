self-hosted-runner:
  # Custom labels used by this repo's self-hosted runners (see
  # .github/workflows/deploy.yaml). Declared here so actionlint doesn't flag
  # them as unknown GitHub-hosted runner labels.
  labels:
    - large
    - root

paths:
  "**/*.yaml":
    ignore:
      - 'unknown permission scope "code-quality"'
