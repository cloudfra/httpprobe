version: "2"

linters:
  # Keep the default set (errcheck, govet, ineffassign, staticcheck, unused)
  # and layer a security-focused, curated set on top of it.
  default: standard
  enable:
    - gosec
    - gocritic
    - unconvert
    - unparam
    - prealloc
    - bodyclose
    - noctx
    - goconst
  # revive already runs standalone in `make lint`, with its own config; enabling
  # golangci-lint's bundled revive linter here would duplicate/conflict with it.
  disable:
    - revive
  exclusions:
    paths:
      - "build/"
      - "third_party/"
